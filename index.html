<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euroviaje 2026 | Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        /* Suavizar el focus de los inputs */
        input:focus, textarea:focus { outline: none; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-32 font-sans text-lg">

    <header class="bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-black italic tracking-tighter text-blue-400 uppercase">EURO 2026</h1>
                <div id="countdown" class="text-xs bg-blue-500/20 text-blue-300 border border-blue-500/30 px-4 py-2 rounded-full font-bold uppercase tracking-widest"></div>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-slate-800/80 p-4 rounded-2xl border border-white/5">
                    <p class="text-[10px] uppercase text-slate-400 font-black mb-1">Presupuesto</p>
                    <p id="stat-total" class="text-xl font-black text-white">$0</p>
                </div>
                <div class="bg-slate-800/80 p-4 rounded-2xl border border-white/5">
                    <p class="text-[10px] uppercase text-slate-400 font-black mb-1">Pagado</p>
                    <p id="stat-pagado" class="text-xl font-black text-green-400">$0</p>
                </div>
                <div class="bg-slate-800/80 p-4 rounded-2xl border border-white/5">
                    <p class="text-[10px] uppercase text-slate-400 font-black mb-1">Falta</p>
                    <p id="stat-pendiente" class="text-xl font-black text-orange-400">$0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        
        <section id="tab-itinerario" class="tab-content active space-y-6">
            <div id="itinerario-list" class="space-y-8"></div>
        </section>

        <section id="tab-globales" class="tab-content space-y-6">
            <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black text-slate-800 uppercase text-lg tracking-widest">Gastos Globales</h2>
                    <button onclick="addGlobalRow()" class="bg-blue-600 text-white p-3 rounded-full shadow-lg hover:bg-blue-700 transition-colors">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </button>
                </div>
                <div id="globales-list" class="space-y-4"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-lg bg-slate-900/95 backdrop-blur-xl rounded-full p-3 flex justify-around items-center shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-white/10">
        <button onclick="showTab('itinerario', this)" class="p-4 text-blue-400 bg-white/10 rounded-full transition-all">
            <i data-lucide="calendar" class="w-7 h-7"></i>
        </button>
        <button onclick="showTab('globales', this)" class="p-4 text-slate-400 hover:text-white transition-all">
            <i data-lucide="globe" class="w-7 h-7"></i>
        </button>
    </nav>

    <script>
        const SB_URL = "https://lmblbrzocgyfqbiyrjte.supabase.co";
        const SB_KEY = "sb_publishable_gBLWhsmXKbPqwjSMPIL96A_BQjLDiZe"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let itinerario = [];
        let globales = [];
        let otros = [];

        async function fetchData() {
            const { data: itData } = await _supabase.from('itinerario').select('*').order('id', { ascending: true });
            const { data: glData } = await _supabase.from('globales').select('*').order('id', { ascending: true });
            const { data: otData } = await _supabase.from('detalles_otros').select('*');
            
            itinerario = itData || [];
            globales = glData || [];
            otros = otData || [];
            renderAll();
        }

        function renderAll() {
            renderItinerario();
            renderGlobales();
            updateStats();
            lucide.createIcons();
        }

        function renderItinerario() {
            const container = document.getElementById('itinerario-list');
            container.innerHTML = itinerario.map(dia => {
                const otrosDia = otros.filter(o => o.itinerario_id === dia.id);
                return `
                <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 p-8">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <p class="text-xs font-black text-blue-500 uppercase tracking-widest mb-1 italic">${dia.fecha}</p>
                            <input type="text" onchange="updateDB('itinerario', ${dia.id}, 'ciudad', this.value)" 
                                   value="${dia.ciudad || ''}" placeholder="¿A dónde vamos?"
                                   class="text-2xl font-black text-slate-800 bg-transparent outline-none w-full placeholder:text-slate-300">
                        </div>
                        <input type="text" onchange="updateDB('itinerario', ${dia.id}, 'pais', this.value)" 
                               value="${dia.pais || ''}" placeholder="PAÍS" 
                               class="text-right text-xs font-black text-slate-400 uppercase w-24 outline-none pt-1">
                    </div>

                    <div class="mb-6">
                        <textarea onchange="updateDB('itinerario', ${dia.id}, 'descripcion_plan', this.value)" 
                                  placeholder="Escribe el plan del día aquí (ej: Visita a la Torre Eiffel, cena en el Barrio Latino...)"
                                  class="w-full text-sm text-slate-600 bg-slate-50 rounded-2xl p-4 border-none resize-none h-20 outline-none font-medium placeholder:text-slate-400"
                        >${dia.descripcion_plan || ''}</textarea>
                    </div>

                    <div class="grid grid-cols-3 gap-3 mb-6">
                        <div class="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100">
                            <label class="text-[9px] font-black uppercase text-slate-400 block mb-2 tracking-tighter">🚌 Traslado</label>
                            <div class="flex items-center justify-between">
                                <input type="number" onchange="updateDB('itinerario', ${dia.id}, 'traslado_monto', this.value)" 
                                       value="${dia.traslado_monto}" class="w-full bg-transparent font-black text-base outline-none text-slate-700">
                                <input type="checkbox" ${dia.traslado_pago ? 'checked' : ''} onchange="updateDB('itinerario', ${dia.id}, 'traslado_pago', this.checked)" class="w-5 h-5 accent-green-500 ml-1">
                            </div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100">
                            <label class="text-[9px] font-black uppercase text-slate-400 block mb-2 tracking-tighter">🏨 Alojamiento</label>
                            <div class="flex items-center justify-between">
                                <input type="number" onchange="updateDB('itinerario', ${dia.id}, 'aloj_monto', this.value)" 
                                       value="${dia.aloj_monto}" class="w-full bg-transparent font-black text-base outline-none text-slate-700">
                                <input type="checkbox" ${dia.aloj_pago ? 'checked' : ''} onchange="updateDB('itinerario', ${dia.id}, 'aloj_pago', this.checked)" class="w-5 h-5 accent-green-500 ml-1">
                            </div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100">
                            <label class="text-[9px] font-black uppercase text-slate-400 block mb-2 tracking-tighter">🍕 Comida</label>
                            <div class="flex items-center justify-between">
                                <input type="number" onchange="updateDB('itinerario', ${dia.id}, 'comida_monto', this.value)" 
                                       value="${dia.comida_monto}" class="w-full bg-transparent font-black text-base outline-none text-slate-700">
                                <input type="checkbox" ${dia.comida_pago ? 'checked' : ''} onchange="updateDB('itinerario', ${dia.id}, 'comida_pago', this.checked)" class="w-5 h-5 accent-green-500 ml-1">
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-100/40 rounded-[2rem] p-5">
                        <div class="flex justify-between items-center mb-4 px-1">
                            <span class="text-xs font-black uppercase text-slate-500 tracking-widest italic flex items-center gap-2">
                                <i data-lucide="sparkles" class="w-4 h-4"></i> Otros Gastos
                            </span>
                            <button onclick="addOtrosRow(${dia.id})" class="bg-white p-2 rounded-full shadow-sm text-blue-600">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div id="otros-container-${dia.id}" class="space-y-3">
                            ${otrosDia.map(o => `
                                <div class="flex items-center gap-3 bg-white p-3 rounded-2xl shadow-sm border border-slate-50">
                                    <input type="checkbox" ${o.pagado ? 'checked' : ''} onchange="updateDB('detalles_otros', ${o.id}, 'pagado', this.checked)" class="w-5 h-5 accent-blue-500">
                                    <input type="text" value="${o.categoria || ''}" onchange="updateDB('detalles_otros', ${o.id}, 'categoria', this.value)" class="text-sm flex-1 outline-none font-bold text-slate-600" placeholder="Ej: Museo">
                                    <div class="flex items-center gap-1 border-l pl-3">
                                        <span class="text-xs font-bold text-slate-300">$</span>
                                        <input type="number" value="${o.monto}" onchange="updateDB('detalles_otros', ${o.id}, 'monto', this.value)" class="w-14 text-right text-sm font-black text-blue-600 outline-none">
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderGlobales() {
            const container = document.getElementById('globales-list');
            container.innerHTML = globales.map(g => `
                <div class="flex items-center gap-4 bg-slate-50 p-5 rounded-[1.5rem] border border-slate-100 shadow-sm">
                    <input type="checkbox" ${g.pagado ? 'checked' : ''} onchange="updateDB('globales', ${g.id}, 'pagado', this.checked)" class="w-6 h-6 accent-blue-600">
                    <input type="text" value="${g.descripcion || ''}" onchange="updateDB('globales', ${g.id}, 'descripcion', this.value)" class="flex-1 bg-transparent text-base font-bold outline-none text-slate-700" placeholder="Ej: Vuelos, Seguro...">
                    <div class="flex items-center gap-1 border-l border-slate-200 pl-4">
                        <span class="text-sm font-bold text-slate-300">$</span>
                        <input type="number" value="${g.monto}" onchange="updateDB('globales', ${g.id}, 'monto', this.value)" class="w-24 bg-transparent text-right font-black text-lg text-blue-600 outline-none">
                    </div>
                </div>
            `).join('');
        }

        async function addGlobalRow() {
            await _supabase.from('globales').insert([{ descripcion: '', monto: 0, pagado: false }]);
            fetchData();
        }

        async function addOtrosRow(itId) {
            await _supabase.from('detalles_otros').insert([{ itinerario_id: itId, categoria: 'Nuevo', monto: 0, pagado: false }]);
            fetchData();
        }

        async function updateDB(tabla, id, columna, valor) {
            await _supabase.from(tabla).update({ [columna]: valor }).eq('id', id);
            // Actualización local para no recargar todo el DOM y perder el focus
            let item;
            if(tabla === 'itinerario') item = itinerario.find(x => x.id === id);
            if(tabla === 'globales') item = globales.find(x => x.id === id);
            if(tabla === 'detalles_otros') item = otros.find(x => x.id === id);
            
            if (item) {
                item[columna] = (columna.includes('monto') || columna === 'monto') ? Number(valor) : valor;
                updateStats();
            }
        }

        function updateStats() {
            let total = 0; let pagado = 0;
            itinerario.forEach(d => {
                total += (Number(d.traslado_monto) || 0) + (Number(d.aloj_monto) || 0) + (Number(d.comida_monto) || 0);
                if(d.traslado_pago) pagado += (Number(d.traslado_monto) || 0);
                if(d.aloj_pago) pagado += (Number(d.aloj_monto) || 0);
                if(d.comida_pago) pagado += (Number(d.comida_monto) || 0);
            });
            globales.forEach(g => {
                total += (Number(g.monto) || 0);
                if(g.pagado) pagado += (Number(g.monto) || 0);
            });
            otros.forEach(o => {
                total += (Number(o.monto) || 0);
                if(o.pagado) pagado += (Number(o.monto) || 0);
            });
            document.getElementById('stat-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('stat-pagado').innerText = `$${pagado.toLocaleString()}`;
            document.getElementById('stat-pendiente').innerText = `$${(total - pagado).toLocaleString()}`;
        }

        function showTab(name, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${name}`).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('text-blue-400', 'bg-white/10'));
            btn.classList.add('text-blue-400', 'bg-white/10');
            lucide.createIcons();
        }

        fetchData();
        const inicio = new Date('2026-05-04');
        const diff = inicio - new Date();
        const dias = Math.ceil(diff / (1000 * 60 * 60 * 24));
        document.getElementById('countdown').innerText = dias > 0 ? `FALTAN ${dias} DÍAS` : "¡A DISFRUTAR!";
    </script>
</body>
</html>
