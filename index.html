<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euroviaje 2026 | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <header class="bg-slate-900 text-white p-5 sticky top-0 z-50 shadow-xl">
        <div class="max-w-xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="map"></i> EUROVIAJE 2026
                </h1>
                <div id="countdown" class="text-xs bg-blue-600 px-2 py-1 rounded-full font-bold"></div>
            </div>
            
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-slate-800 p-2 rounded-xl border border-slate-700">
                    <p class="text-[10px] uppercase text-slate-400">Total</p>
                    <p id="stat-total" class="text-lg font-bold text-blue-400">$0</p>
                </div>
                <div class="bg-slate-800 p-2 rounded-xl border border-slate-700">
                    <p class="text-[10px] uppercase text-slate-400">Pagado</p>
                    <p id="stat-pagado" class="text-lg font-bold text-green-400">$0</p>
                </div>
                <div class="bg-slate-800 p-2 rounded-xl border border-slate-700">
                    <p class="text-[10px] uppercase text-slate-400">Pendiente</p>
                    <p id="stat-pendiente" class="text-lg font-bold text-orange-400">$0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4">
        
        <section id="tab-itinerario" class="tab-content active">
            <div id="itinerario-list" class="space-y-4">
                <p class="text-center p-10 text-slate-500">Cargando aventura...</p>
            </div>
        </section>

        <section id="tab-globales" class="tab-content">
            <div class="bg-white rounded-2xl shadow-sm border p-4 space-y-4">
                <h2 class="font-bold text-lg border-b pb-2">Gastos Generales</h2>
                <div id="globales-list" class="space-y-3">
                    </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="showTab('itinerario', this)" class="flex flex-col items-center text-blue-600">
            <i data-lucide="calendar"></i><span class="text-[10px] font-bold">Itinerario</span>
        </button>
        <button onclick="showTab('globales', this)" class="flex flex-col items-center text-slate-400">
            <i data-lucide="shopping-bag"></i><span class="text-[10px] font-bold">Globales</span>
        </button>
    </nav>

    <script>
        const SB_URL = "https://lmblbrzocgyfqbiyrjte.supabase.co";
        const SB_KEY = "sb_publishable_gBLWhsmXKbPqwjSMPIL96A_BQjLDiZe"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let itinerario = [];
        let globales = [];

        async function fetchData() {
            try {
                const { data: itData } = await _supabase.from('itinerario').select('*').order('id', { ascending: true });
                const { data: glData } = await _supabase.from('globales').select('*').order('id', { ascending: true });
                
                itinerario = itData || [];
                globales = glData || [];
                renderAll();
            } catch (err) {
                console.error("Error:", err);
            }
        }

        function renderAll() {
            renderItinerario();
            renderGlobales();
            updateStats();
            lucide.createIcons();
        }

        function renderItinerario() {
            const container = document.getElementById('itinerario-list');
            container.innerHTML = itinerario.map(dia => `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 transition-all">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2 mb-3">
                        <span class="font-black text-slate-800 text-sm italic uppercase">${dia.fecha}</span>
                        <input type="text" onchange="updateDB('itinerario', ${dia.id}, 'pais', this.value)" 
                               placeholder="País" value="${dia.pais || ''}" 
                               class="text-right text-xs font-bold text-blue-600 focus:outline-none bg-transparent w-24">
                    </div>
                    <div class="space-y-3">
                        <div>
                            <input type="text" onchange="updateDB('itinerario', ${dia.id}, 'ciudad', this.value)" 
                                   placeholder="📍 ¿A qué ciudad vas?" value="${dia.ciudad || ''}" 
                                   class="w-full text-base font-semibold text-slate-700 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-slate-50 p-2 rounded-xl border border-slate-100">
                                <label class="text-[9px] text-slate-400 block font-black uppercase">Traslado</label>
                                <div class="flex items-center gap-2">
                                    <span class="text-xs text-slate-400">$</span>
                                    <input type="number" onchange="updateDB('itinerario', ${dia.id}, 'traslado_monto', this.value)" 
                                           value="${dia.traslado_monto}" class="w-full bg-transparent font-bold text-sm outline-none">
                                    <input type="checkbox" ${dia.traslado_pago ? 'checked' : ''} 
                                           onchange="updateDB('itinerario', ${dia.id}, 'traslado_pago', this.checked)"
                                           class="w-4 h-4 rounded-full border-slate-300 text-blue-600">
                                </div>
                            </div>
                            <div class="bg-slate-50 p-2 rounded-xl border border-slate-100">
                                <label class="text-[9px] text-slate-400 block font-black uppercase">Alojamiento</label>
                                <div class="flex items-center gap-2">
                                    <span class="text-xs text-slate-400">$</span>
                                    <input type="number" onchange="updateDB('itinerario', ${dia.id}, 'aloj_monto', this.value)" 
                                           value="${dia.aloj_monto}" class="w-full bg-transparent font-bold text-sm outline-none">
                                    <input type="checkbox" ${dia.aloj_pago ? 'checked' : ''} 
                                           onchange="updateDB('itinerario', ${dia.id}, 'aloj_pago', this.checked)"
                                           class="w-4 h-4 rounded-full border-slate-300 text-blue-600">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderGlobales() {
            const container = document.getElementById('globales-list');
            if (globales.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 text-sm">No hay gastos agregados.</p>';
                return;
            }
            container.innerHTML = globales.map(g => `
                <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl">
                    <input type="checkbox" ${g.pagado ? 'checked' : ''} onchange="updateDB('globales', ${g.id}, 'pagado', this.checked)" class="w-5 h-5">
                    <input type="text" value="${g.descripcion || ''}" onchange="updateDB('globales', ${g.id}, 'descripcion', this.value)" 
                           class="flex-1 bg-transparent text-sm outline-none" placeholder="Vuelos, Seguro...">
                    <input type="number" value="${g.monto}" onchange="updateDB('globales', ${g.id}, 'monto', this.value)" 
                           class="w-16 bg-transparent text-right font-bold text-sm outline-none">
                </div>
            `).join('');
        }

        async function updateDB(tabla, id, columna, valor) {
            await _supabase.from(tabla).update({ [columna]: valor }).eq('id', id);
            const lista = (tabla === 'itinerario' ? itinerario : globales);
            const item = lista.find(x => x.id === id);
            if (item) {
                item[columna] = valor;
                updateStats();
            }
        }

        function updateStats() {
            let total = 0; let pagado = 0;
            itinerario.forEach(d => {
                total += (Number(d.traslado_monto) || 0) + (Number(d.aloj_monto) || 0) + (Number(d.otros_monto) || 0);
                if(d.traslado_pago) pagado += (Number(d.traslado_monto) || 0);
                if(d.aloj_pago) pagado += (Number(d.aloj_monto) || 0);
            });
            globales.forEach(g => {
                total += (Number(g.monto) || 0);
                if(g.pagado) pagado += (Number(g.monto) || 0);
            });
            document.getElementById('stat-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('stat-pagado').innerText = `$${pagado.toLocaleString()}`;
            document.getElementById('stat-pendiente').innerText = `$${(total - pagado).toLocaleString()}`;
        }

        function showTab(name, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${name}`).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-blue-600', 'text-slate-400'));
            btn.classList.replace('text-slate-400', 'text-blue-600');
        }

        function updateCountdown() {
            const inicio = new Date('2026-05-04');
            const diff = inicio - new Date();
            const dias = Math.ceil(diff / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').innerText = dias > 0 ? `FALTAN ${dias} DÍAS` : "🚀 ¡EN VIAJE!";
        }

        updateCountdown();
        fetchData();
    </script>
</body>
</html>
