<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euroviaje 2026 | No Censurado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <header class="bg-blue-600 text-white p-6 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i data-lucide="plane-takeoff"></i> EUROVIAJE 2026
            </h1>
            <div class="grid grid-cols-3 gap-4 mt-6 text-center">
                <div class="bg-blue-700 p-2 rounded-lg">
                    <p class="text-xs opacity-80 uppercase">Total</p>
                    <p id="stat-total" class="font-bold text-lg">$0</p>
                </div>
                <div class="bg-green-600 p-2 rounded-lg">
                    <p class="text-xs opacity-80 uppercase">Pagado</p>
                    <p id="stat-pagado" class="font-bold text-lg">$0</p>
                </div>
                <div class="bg-orange-500 p-2 rounded-lg">
                    <p class="text-xs opacity-80 uppercase">Pendiente</p>
                    <p id="stat-pendiente" class="font-bold text-lg">$0</p>
                </div>
            </div>
            <div id="countdown" class="text-center mt-4 text-sm font-medium italic"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        
        <section id="tab-itinerario" class="tab-content active space-y-4">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-bold text-gray-800">📅 Plan Diario</h2>
                <button onclick="fetchData()" class="text-blue-600 p-2"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            </div>
            <div id="itinerario-list" class="space-y-4">
                <div class="flex justify-center p-10"><div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div></div>
            </div>
        </section>

        <section id="tab-globales" class="tab-content space-y-4">
            <h2 class="text-xl font-bold text-gray-800">🎒 Gastos Generales</h2>
            <div id="globales-list" class="bg-white rounded-xl shadow p-4 space-y-3">
                </div>
            <button onclick="addRow('globales')" class="w-full bg-gray-200 text-gray-700 py-3 rounded-xl font-bold">+ Agregar Gasto</button>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around p-3 z-50">
        <button onclick="showTab('itinerario')" class="flex flex-col items-center text-blue-600">
            <i data-lucide="calendar"></i><span class="text-xs">Itinerario</span>
        </button>
        <button onclick="showTab('globales')" class="flex flex-col items-center text-gray-400">
            <i data-lucide="wallet"></i><span class="text-xs">Globales</span>
        </button>
        <button onclick="showTab('otros')" class="flex flex-col items-center text-gray-400">
            <i data-lucide="layout-grid"></i><span class="text-xs">Otros</span>
        </button>
    </nav>

<script>
        // CONFIGURACIÓN SUPABASE
        const SB_URL = "https://lmblbrzocgyfqbiyrjte.supabase.co";
        const SB_KEY = "sb_publishable_gBLWhsmXKbPqwjSMPIL96A_BQjLDiZe"; 
        
        // Usamos un nombre diferente para la variable para evitar conflictos con la librería
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let itinerario = [];
        let globales = [];

        async function fetchData() {
            try {
                const { data: itData, error: itError } = await _supabase.from('itinerario').select('*').order('id', { ascending: true });
                if (itError) throw itError;
                itinerario = itData || [];
                
                const { data: glData, error: glError } = await _supabase.from('globales').select('*').order('id', { ascending: true });
                if (glError) throw glError;
                globales = glData || [];

                renderAll();
            } catch (err) {
                console.error("Error cargando datos:", err);
                document.getElementById('itinerario-list').innerHTML = `<p class="text-red-500 p-4">Error de conexión: ${err.message}</p>`;
            }
        }

        function renderAll() {
            renderItinerario();
            renderGlobales();
            updateStats();
            if (window.lucide) lucide.createIcons();
        }

        function renderItinerario() {
            const container = document.getElementById('itinerario-list');
            if (itinerario.length === 0) {
                container.innerHTML = '<p class="text-center p-10 text-gray-400">No hay datos. Verifica el SQL Editor en Supabase.</p>';
                return;
            }
            container.innerHTML = itinerario.map(dia => `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">
                    <div class="flex justify-between items-center border-b pb-2 mb-3">
                        <span class="font-bold text-blue-600">${dia.fecha}</span>
                        <input type="text" onchange="updateDB('itinerario', ${dia.id}, 'pais', this.value)" 
                               placeholder="País" value="${dia.pais || ''}" 
                               class="text-right text-sm font-medium focus:outline-none bg-transparent">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="text-[10px] uppercase text-gray-400 block font-bold">Ciudad / Destino</label>
                            <input type="text" onchange="updateDB('itinerario', ${dia.id}, 'ciudad', this.value)" 
                                   value="${dia.ciudad || ''}" class="w-full font-medium text-gray-700 outline-none">
                        </div>
                        <div class="bg-gray-50 p-2 rounded-lg">
                            <label class="text-[10px] text-gray-400 block font-bold">Traslado $</label>
                            <input type="number" onchange="updateDB('itinerario', ${dia.id}, 'traslado_monto', this.value)" 
                                   value="${dia.traslado_monto}" class="w-full bg-transparent font-bold outline-none">
                            <div class="flex items-center gap-1 mt-1">
                                <input type="checkbox" ${dia.traslado_pago ? 'checked' : ''} 
                                       onchange="updateDB('itinerario', ${dia.id}, 'traslado_pago', this.checked)">
                                <span class="text-[10px] text-gray-500 font-bold">PAGADO</span>
                            </div>
                        </div>
                        <div class="bg-gray-50 p-2 rounded-lg">
                            <label class="text-[10px] text-gray-400 block font-bold">Alojamiento $</label>
                            <input type="number" onchange="updateDB('itinerario', ${dia.id}, 'aloj_monto', this.value)" 
                                   value="${dia.aloj_monto}" class="w-full bg-transparent font-bold outline-none">
                            <div class="flex items-center gap-1 mt-1">
                                <input type="checkbox" ${dia.aloj_pago ? 'checked' : ''} 
                                       onchange="updateDB('itinerario', ${dia.id}, 'aloj_pago', this.checked)">
                                <span class="text-[10px] text-gray-500 font-bold">PAGADO</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function updateDB(tabla, id, columna, valor) {
            await _supabase.from(tabla).update({ [columna]: valor }).eq('id', id);
            // Actualización local para fluidez
            const lista = (tabla === 'itinerario' ? itinerario : globales);
            const item = lista.find(x => x.id === id);
            if (item) {
                item[columna] = valor;
                updateStats();
            }
        }

        function updateStats() {
            let total = 0; let pagado = 0;
            itinerario.forEach(d => {
                total += (Number(d.traslado_monto) || 0) + (Number(d.aloj_monto) || 0);
                if(d.traslado_pago) pagado += (Number(d.traslado_monto) || 0);
                if(d.aloj_pago) pagado += (Number(d.aloj_monto) || 0);
            });
            globales.forEach(g => {
                total += (Number(g.monto) || 0);
                if(g.pagado) pagado += (Number(g.monto) || 0);
            });
            document.getElementById('stat-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('stat-pagado').innerText = `$${pagado.toLocaleString()}`;
            document.getElementById('stat-pendiente').innerText = `$${(total - pagado).toLocaleString()}`;
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        fetchData();
    </script>
</body>
</html>
