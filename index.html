<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euroviaje 2026 | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        input:focus, textarea:focus { outline: none; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-zinc-100 min-h-screen pb-32 font-sans">

    <header class="bg-zinc-900 text-white p-6 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-2xl mx-auto text-center">
            <h1 class="text-2xl font-black italic tracking-tighter text-blue-500 uppercase mb-4">EURO 2026</h1>
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-zinc-800 p-3 rounded-2xl border border-white/5">
                    <p class="text-[9px] uppercase text-zinc-400 font-bold mb-1">Total</p>
                    <p id="stat-total" class="text-lg font-black text-white leading-none">$0</p>
                </div>
                <div class="bg-zinc-800 p-3 rounded-2xl border border-white/5">
                    <p class="text-[9px] uppercase text-zinc-400 font-bold mb-1">Pagado</p>
                    <p id="stat-pagado" class="text-lg font-black text-green-400 leading-none">$0</p>
                </div>
                <div class="bg-zinc-800 p-3 rounded-2xl border border-white/5">
                    <p class="text-[9px] uppercase text-zinc-400 font-bold mb-1">Falta</p>
                    <p id="stat-pendiente" class="text-lg font-black text-orange-400 leading-none">$0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-8">
        
        <section id="tab-itinerario" class="tab-content active space-y-8"></section>

        <section id="tab-globales" class="tab-content space-y-4">
            <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-zinc-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black text-zinc-800 uppercase text-sm tracking-widest italic">Gastos Globales</h2>
                    <button onclick="addGlobalRow()" class="bg-zinc-900 text-white p-2 rounded-full"><i data-lucide="plus" class="w-5 h-5"></i></button>
                </div>
                <div id="globales-list" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 flex gap-2 p-1.5 glass-nav rounded-2xl shadow-2xl border border-white/10 z-50">
        <button onclick="showTab('itinerario', this)" class="px-5 py-2.5 text-blue-400 bg-white/10 rounded-xl transition-all flex items-center gap-2">
            <i data-lucide="calendar" class="w-5 h-5"></i>
            <span class="text-[10px] font-black uppercase tracking-widest">Plan</span>
        </button>
        <button onclick="showTab('globales', this)" class="px-5 py-2.5 text-zinc-400 hover:text-white transition-all flex items-center gap-2">
            <i data-lucide="globe" class="w-5 h-5"></i>
            <span class="text-[10px] font-black uppercase tracking-widest">Gral</span>
        </button>
    </nav>

    <script>
        const SB_URL = "https://lmblbrzocgyfqbiyrjte.supabase.co";
        const SB_KEY = "sb_publishable_gBLWhsmXKbPqwjSMPIL96A_BQjLDiZe"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let itinerario = [];
        let globales = [];
        let otros = [];

        async function fetchData() {
            const { data: itData } = await _supabase.from('itinerario').select('*').order('id', { ascending: true });
            const { data: glData } = await _supabase.from('globales').select('*').order('id', { ascending: true });
            const { data: otData } = await _supabase.from('detalles_otros').select('*');
            itinerario = itData || []; globales = glData || []; otros = otData || [];
            renderAll();
        }

        function renderAll() {
            const container = document.getElementById('tab-itinerario');
            container.innerHTML = itinerario.map(dia => {
                const otrosDia = otros.filter(o => o.itinerario_id === dia.id);
                const totalDia = Number(dia.traslado_monto || 0) + Number(dia.aloj_monto || 0) + Number(dia.comida_monto || 0) + otrosDia.reduce((acc, o) => acc + Number(o.monto || 0), 0);

                return `
                <div class="bg-white rounded-[2.5rem] shadow-xl border border-zinc-200 overflow-hidden">
                    <div class="p-8">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex-1">
                                <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-1 italic">${dia.fecha}</p>
                                <input type="text" onchange="updateDB('itinerario', ${dia.id}, 'ciudad', this.value)" 
                                       value="${dia.ciudad || ''}" placeholder="DESTINO"
                                       class="text-2xl font-black text-zinc-900 bg-transparent outline-none w-full placeholder:text-zinc-200">
                            </div>
                            <input type="text" onchange="updateDB('itinerario', ${dia.id}, 'pais', this.value)" 
                                   value="${dia.pais || ''}" placeholder="PAÍS" 
                                   class="text-right text-base font-black text-zinc-800 uppercase w-32 outline-none pt-1 border-b-2 border-zinc-100 focus:border-blue-500 transition-all">
                        </div>

                        <textarea onchange="updateDB('itinerario', ${dia.id}, 'descripcion_plan', this.value)" 
                                  placeholder="Plan del día..."
                                  class="w-full text-sm text-zinc-500 bg-zinc-50 rounded-2xl p-4 mb-8 border-none resize-none h-20 outline-none font-medium"
                        >${dia.descripcion_plan || ''}</textarea>

                        <div class="grid grid-cols-1 gap-4 mb-8 sm:grid-cols-3">
                            ${renderGastoCard(dia, 'traslado', 'bus', 'Traslado')}
                            ${renderGastoCard(dia, 'aloj', 'hotel', 'Alojamiento')}
                            ${renderGastoCard(dia, 'comida', 'utensils', 'Comida')}
                        </div>

                        <div class="bg-zinc-50 rounded-[2rem] p-6 mb-4">
                            <div class="flex justify-between items-center mb-4 px-2">
                                <span class="text-[10px] font-black uppercase text-zinc-400 tracking-widest italic flex items-center gap-2">
                                    <i data-lucide="plus-circle" class="w-3 h-3"></i> Otros Gastos
                                </span>
                                <button onclick="addOtrosRow(${dia.id})" class="text-zinc-900 bg-white w-8 h-8 rounded-full shadow-sm flex items-center justify-center">
                                    <i data-lucide="plus" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <div class="space-y-3">
                                ${otrosDia.map(o => `
                                    <div class="flex items-center gap-3 bg-white p-3 rounded-2xl shadow-sm border border-zinc-100">
                                        <input type="checkbox" ${o.pagado ? 'checked' : ''} onchange="updateDB('detalles_otros', ${o.id}, 'pagado', this.checked)" class="w-5 h-5 accent-zinc-900">
                                        <input type="text" value="${o.categoria || ''}" onchange="updateDB('detalles_otros', ${o.id}, 'categoria', this.value)" class="text-xs flex-1 outline-none font-bold text-zinc-600 uppercase" placeholder="...">
                                        <div class="flex items-center gap-1 border-l pl-3">
                                            <span class="text-[10px] font-bold text-zinc-300">$</span>
                                            <input type="number" value="${o.monto}" onchange="updateDB('detalles_otros', ${o.id}, 'monto', this.value)" class="w-16 text-right text-sm font-black text-zinc-900 outline-none">
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="bg-zinc-900 p-5 text-center">
                        <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1 italic">Total del Día</p>
                        <p class="text-2xl font-black text-white tracking-tighter italic">$${totalDia.toLocaleString()}</p>
                    </div>
                </div>`;
            }).join('');
            
            renderGlobales();
            updateStats();
            lucide.createIcons();
        }

        function renderGastoCard(dia, key, icon, label) {
            return `
            <div class="bg-white p-5 rounded-[2rem] border-2 border-zinc-100 flex flex-col items-center">
                <div class="flex items-center gap-2 mb-4 w-full justify-between px-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="${icon}" class="w-5 h-5 text-zinc-400"></i>
                        <span class="text-[10px] font-black uppercase text-zinc-400 tracking-tighter">${label}</span>
                    </div>
                    <input type="checkbox" ${dia[key+'_pago'] ? 'checked' : ''} onchange="updateDB('itinerario', ${dia.id}, '${key}_pago', this.checked)" class="w-5 h-5 accent-zinc-900">
                </div>
                <div class="flex items-baseline gap-1">
                    <span class="text-base font-black text-zinc-300">$</span>
                    <input type="number" onchange="updateDB('itinerario', ${dia.id}, '${key}_monto', this.value)" 
                           value="${dia[key+'_monto']}" class="w-full bg-transparent font-black text-3xl text-center text-zinc-900 outline-none tracking-tighter">
                </div>
            </div>`;
        }

        function renderGlobales() {
            const container = document.getElementById('globales-list');
            container.innerHTML = globales.map(g => `
                <div class="flex items-center gap-4 bg-zinc-50 p-5 rounded-3xl border border-zinc-100">
                    <input type="checkbox" ${g.pagado ? 'checked' : ''} onchange="updateDB('globales', ${g.id}, 'pagado', this.checked)" class="w-6 h-6 accent-zinc-900">
                    <input type="text" value="${g.descripcion || ''}" onchange="updateDB('globales', ${g.id}, 'descripcion', this.value)" class="flex-1 bg-transparent text-sm font-black outline-none text-zinc-700" placeholder="...">
                    <div class="flex items-center gap-1 border-l pl-4">
                        <span class="text-sm font-bold text-zinc-300">$</span>
                        <input type="number" value="${g.monto}" onchange="updateDB('globales', ${g.id}, 'monto', this.value)" class="w-20 bg-transparent text-right font-black text-xl text-zinc-900 outline-none">
                    </div>
                </div>`).join('');
        }

        async function addGlobalRow() { await _supabase.from('globales').insert([{ descripcion: '', monto: 0, pagado: false }]); fetchData(); }
        async function addOtrosRow(itId) { await _supabase.from('detalles_otros').insert([{ itinerario_id: itId, categoria: 'NUEVO', monto: 0, pagado: false }]); fetchData(); }
        async function updateDB(tabla, id, columna, valor) { await _supabase.from(tabla).update({ [columna]: (columna.includes('monto') || columna === 'monto') ? Number(valor) : valor }).eq('id', id); fetchData(); }

        function updateStats() {
            let t = 0, p = 0;
            itinerario.forEach(d => {
                t += (Number(d.traslado_monto) || 0) + (Number(d.aloj_monto) || 0) + (Number(d.comida_monto) || 0);
                if(d.traslado_pago) p += (Number(d.traslado_monto) || 0);
                if(d.aloj_pago) p += (Number(d.aloj_monto) || 0);
                if(d.comida_pago) p += (Number(d.comida_monto) || 0);
            });
            globales.forEach(g => { t += (Number(g.monto) || 0); if(g.pagado) p += (Number(g.monto) || 0); });
            otros.forEach(o => { t += (Number(o.monto) || 0); if(o.pagado) p += (Number(o.monto) || 0); });
            document.getElementById('stat-total').innerText = `$${t.toLocaleString()}`;
            document.getElementById('stat-pagado').innerText = `$${p.toLocaleString()}`;
            document.getElementById('stat-pendiente').innerText = `$${(t - p).toLocaleString()}`;
        }

        function showTab(name, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${name}`).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('text-blue-400', 'bg-white/10'));
            document.querySelectorAll('nav button').forEach(b => b.classList.add('text-zinc-400'));
            btn.classList.remove('text-zinc-400'); btn.classList.add('text-blue-400', 'bg-white/10');
            lucide.createIcons();
        }

        fetchData();
    </script>
</body>
</html>
