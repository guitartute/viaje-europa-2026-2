<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euroviaje 2026 | Color Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        input:focus, textarea:focus { outline: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-32 font-sans text-slate-900">

    <header class="bg-gradient-to-br from-indigo-600 to-blue-700 text-white p-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-2xl mx-auto text-center">
            <h1 class="text-2xl font-black italic tracking-tighter mb-4 uppercase">🌍 EURO 2026 ✈️</h1>
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-white/10 backdrop-blur-md p-3 rounded-2xl border border-white/20">
                    <p class="text-[9px] uppercase font-bold mb-1 opacity-80">Presupuesto</p>
                    <p id="stat-total" class="text-lg font-black leading-none">$0</p>
                </div>
                <div class="bg-emerald-500/20 backdrop-blur-md p-3 rounded-2xl border border-emerald-400/30">
                    <p class="text-[9px] uppercase font-bold mb-1 text-emerald-200">Pagado</p>
                    <p id="stat-pagado" class="text-lg font-black text-emerald-300 leading-none">$0</p>
                </div>
                <div class="bg-orange-500/20 backdrop-blur-md p-3 rounded-2xl border border-orange-400/30">
                    <p class="text-[9px] uppercase font-bold mb-1 text-orange-200">Falta</p>
                    <p id="stat-pendiente" class="text-lg font-black text-orange-300 leading-none">$0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-8">
        <section id="tab-itinerario" class="tab-content active space-y-8"></section>

        <section id="tab-globales" class="tab-content space-y-4">
            <div class="bg-white rounded-[2rem] p-6 card-shadow border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black text-indigo-900 uppercase text-sm tracking-widest italic">🎒 Gastos Globales</h2>
                    <button onclick="addGlobalRow()" class="bg-indigo-600 text-white w-10 h-10 rounded-full shadow-lg text-xl font-bold">+</button>
                </div>
                <div id="globales-list" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 flex gap-4 p-2 glass-nav rounded-3xl shadow-2xl border border-slate-200 z-50">
        <button onclick="showTab('itinerario', this)" class="px-6 py-3 text-indigo-600 bg-indigo-50 rounded-2xl transition-all flex items-center gap-2 font-black text-xs uppercase tracking-widest">
            <span>📅</span> Plan
        </button>
        <button onclick="showTab('globales', this)" class="px-6 py-3 text-slate-400 hover:text-indigo-600 transition-all flex items-center gap-2 font-black text-xs uppercase tracking-widest">
            <span>🌍</span> Gral
        </button>
    </nav>

    <script>
        const SB_URL = "https://lmblbrzocgyfqbiyrjte.supabase.co";
        const SB_KEY = "sb_publishable_gBLWhsmXKbPqwjSMPIL96A_BQjLDiZe"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let itinerario = []; let globales = []; let otros = [];

        async function fetchData() {
            const { data: itData } = await _supabase.from('itinerario').select('*').order('id', { ascending: true });
            const { data: glData } = await _supabase.from('globales').select('*').order('id', { ascending: true });
            const { data: otData } = await _supabase.from('detalles_otros').select('*');
            itinerario = itData || []; globales = glData || []; otros = otData || [];
            renderAll();
        }

        function renderAll() {
            const container = document.getElementById('tab-itinerario');
            container.innerHTML = itinerario.map(dia => {
                const otrosDia = otros.filter(o => o.itinerario_id === dia.id);
                const totalDia = Number(dia.traslado_monto || 0) + Number(dia.aloj_monto || 0) + Number(dia.comida_monto || 0) + otrosDia.reduce((acc, o) => acc + Number(o.monto || 0), 0);

                return `
                <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
                    <div class="p-7">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex-1">
                                <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-1 italic">🗓️ ${dia.fecha}</p>
                                <input type="text" onchange="updateDB('itinerario', ${dia.id}, 'ciudad', this.value)" 
                                       value="${dia.ciudad || ''}" placeholder="¿DÓNDE VAMOS?"
                                       class="text-2xl font-black text-slate-800 bg-transparent outline-none w-full placeholder:text-slate-200">
                            </div>
                            <input type="text" onchange="updateDB('itinerario', ${dia.id}, 'pais', this.value)" 
                                   value="${dia.pais || ''}" placeholder="PAÍS" 
                                   class="text-right text-base font-black text-indigo-600 uppercase w-32 outline-none border-b-2 border-indigo-50 focus:border-indigo-400 transition-all">
                        </div>

                        <textarea onchange="updateDB('itinerario', ${dia.id}, 'descripcion_plan', this.value)" 
                                  placeholder="Escribe el plan aquí..."
                                  class="w-full text-sm text-slate-500 bg-slate-50 rounded-2xl p-4 mb-6 border-none resize-none h-20 outline-none font-medium"
                        >${dia.descripcion_plan || ''}</textarea>

                        <div class="grid grid-cols-1 gap-4 mb-6 sm:grid-cols-3">
                            ${renderGastoCard(dia, 'traslado', '🚌', 'Traslado', 'bg-amber-50', 'text-amber-600')}
                            ${renderGastoCard(dia, 'aloj', '🏨', 'Hotel', 'bg-blue-50', 'text-blue-600')}
                            ${renderGastoCard(dia, 'comida', '🍕', 'Comida', 'bg-rose-50', 'text-rose-600')}
                        </div>

                        <div class="bg-slate-50 rounded-[2rem] p-5">
                            <div class="flex justify-between items-center mb-4 px-2">
                                <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest italic">✨ Otros Detalle</span>
                                <button onclick="addOtrosRow(${dia.id})" class="bg-white text-indigo-600 w-8 h-8 rounded-full shadow-sm font-bold text-lg">+</button>
                            </div>
                            <div class="space-y-3">
                                ${otrosDia.map(o => `
                                    <div class="flex items-center gap-2 bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
                                        <input type="checkbox" ${o.pagado ? 'checked' : ''} onchange="updateDB('detalles_otros', ${o.id}, 'pagado', this.checked)" class="w-5 h-5 accent-indigo-600 flex-shrink-0">
                                        <input type="text" value="${o.categoria || ''}" onchange="updateDB('detalles_otros', ${o.id}, 'categoria', this.value)" class="text-xs flex-1 outline-none font-bold text-slate-600 min-w-0" placeholder="...">
                                        <div class="flex items-center gap-0.5 border-l pl-2 flex-shrink-0">
                                            <span class="text-[10px] font-bold text-slate-300">$</span>
                                            <input type="number" value="${o.monto}" onchange="updateDB('detalles_otros', ${o.id}, 'monto', this.value)" class="w-14 text-right text-sm font-black text-indigo-600 outline-none">
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="bg-slate-900 p-5 text-center">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Subtotal del Día</p>
                        <p class="text-2xl font-black text-white italic tracking-tighter">$${totalDia.toLocaleString()}</p>
                    </div>
                </div>`;
            }).join('');
            renderGlobales();
            updateStats();
        }

        function renderGastoCard(dia, key, emoji, label, bgColor, textColor) {
            return `
            <div class="${bgColor} p-5 rounded-[2rem] border border-black/5 flex flex-col items-center relative">
                <div class="flex items-center justify-between w-full mb-3 px-1">
                    <span class="text-lg">${emoji}</span>
                    <input type="checkbox" ${dia[key+'_pago'] ? 'checked' : ''} onchange="updateDB('itinerario', ${dia.id}, '${key}_pago', this.checked)" class="w-5 h-5 accent-slate-900">
                </div>
                <p class="text-[9px] font-black uppercase ${textColor} opacity-70 tracking-tighter mb-2">${label}</p>
                <div class="flex items-baseline gap-0.5">
                    <span class="text-base font-black ${textColor} opacity-30">$</span>
                    <input type="number" onchange="updateDB('itinerario', ${dia.id}, '${key}_monto', this.value)" 
                           value="${dia[key+'_monto']}" class="w-full bg-transparent font-black text-3xl text-center ${textColor} outline-none tracking-tighter">
                </div>
            </div>`;
        }

        function renderGlobales() {
            const container = document.getElementById('globales-list');
            container.innerHTML = globales.map(g => `
                <div class="flex items-center gap-3 bg-indigo-50/50 p-4 rounded-3xl border border-indigo-100">
                    <input type="checkbox" ${g.pagado ? 'checked' : ''} onchange="updateDB('globales', ${g.id}, 'pagado', this.checked)" class="w-6 h-6 accent-indigo-600 flex-shrink-0">
                    <input type="text" value="${g.descripcion || ''}" onchange="updateDB('globales', ${g.id}, 'descripcion', this.value)" class="flex-1 bg-transparent text-sm font-bold outline-none text-slate-700 min-w-0" placeholder="...">
                    <div class="flex items-center gap-0.5 border-l border-indigo-200 pl-3 flex-shrink-0">
                        <span class="text-xs font-bold text-indigo-300">$</span>
                        <input type="number" value="${g.monto}" onchange="updateDB('globales', ${g.id}, 'monto', this.value)" class="w-20 bg-transparent text-right font-black text-xl text-indigo-700 outline-none">
                    </div>
                </div>`).join('');
        }

        async function addGlobalRow() { await _supabase.from('globales').insert([{ descripcion: '', monto: 0, pagado: false }]); fetchData(); }
        async function addOtrosRow(itId) { await _supabase.from('detalles_otros').insert([{ itinerario_id: itId, categoria: 'NUEVO', monto: 0, pagado: false }]); fetchData(); }
        async function updateDB(tabla, id, columna, valor) { await _supabase.from(tabla).update({ [columna]: (columna.includes('monto') || columna === 'monto') ? Number(valor) : valor }).eq('id', id); fetchData(); }

        function updateStats() {
            let t = 0, p = 0;
            itinerario.forEach(d => {
                t += (Number(d.traslado_monto) || 0) + (Number(d.aloj_monto) || 0) + (Number(d.comida_monto) || 0);
                if(d.traslado_pago) p += (Number(d.traslado_monto) || 0);
                if(d.aloj_pago) p += (Number(d.aloj_monto) || 0);
                if(d.comida_pago) p += (Number(d.comida_monto) || 0);
            });
            globales.forEach(g => { t += (Number(g.monto) || 0); if(g.pagado) p += (Number(g.monto) || 0); });
            otros.forEach(o => { t += (Number(o.monto) || 0); if(o.pagado) p += (Number(o.monto) || 0); });
            document.getElementById('stat-total').innerText = `$${t.toLocaleString()}`;
            document.getElementById('stat-pagado').innerText = `$${p.toLocaleString()}`;
            document.getElementById('stat-pendiente').innerText = `$${(t - p).toLocaleString()}`;
        }

        function showTab(name, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${name}`).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('text-indigo-600', 'bg-indigo-50');
                b.classList.add('text-slate-400');
            });
            btn.classList.remove('text-slate-400');
            btn.classList.add('text-indigo-600', 'bg-indigo-50');
        }
        fetchData();
    </script>
</body>
</html>
</html>
