<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euroviaje 2026 | Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        .card-expand { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans">

    <header class="bg-slate-900 text-white p-5 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-black italic tracking-tighter text-blue-400">EURO 2026</h1>
                <div id="countdown" class="text-[10px] bg-blue-500/20 text-blue-300 border border-blue-500/30 px-3 py-1 rounded-full font-bold uppercase"></div>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-slate-800/50 p-3 rounded-2xl border border-white/5">
                    <p class="text-[9px] uppercase text-slate-400 font-bold mb-1">Presupuesto</p>
                    <p id="stat-total" class="text-base font-black text-white">$0</p>
                </div>
                <div class="bg-slate-800/50 p-3 rounded-2xl border border-white/5">
                    <p class="text-[9px] uppercase text-slate-400 font-bold mb-1">Pagado</p>
                    <p id="stat-pagado" class="text-base font-black text-green-400">$0</p>
                </div>
                <div class="bg-slate-800/50 p-3 rounded-2xl border border-white/5">
                    <p class="text-[9px] uppercase text-slate-400 font-bold mb-1">Falta</p>
                    <p id="stat-pendiente" class="text-base font-black text-orange-400">$0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4">
        
        <section id="tab-itinerario" class="tab-content active space-y-4">
            <div id="itinerario-list" class="space-y-4"></div>
        </section>

        <section id="tab-globales" class="tab-content space-y-4">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-black text-slate-800 uppercase text-sm tracking-widest">Gastos Globales</h2>
                    <button onclick="addGlobalRow()" class="bg-blue-600 text-white p-2 rounded-full shadow-lg">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </button>
                </div>
                <div id="globales-list" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-slate-900/90 backdrop-blur-lg rounded-full p-2 flex justify-around items-center shadow-2xl border border-white/10">
        <button onclick="showTab('itinerario', this)" class="p-3 text-blue-400 bg-white/10 rounded-full transition-all">
            <i data-lucide="calendar"></i>
        </button>
        <button onclick="showTab('globales', this)" class="p-3 text-slate-400 hover:text-white transition-all">
            <i data-lucide="globe"></i>
        </button>
    </nav>

    <script>
        const SB_URL = "https://lmblbrzocgyfqbiyrjte.supabase.co";
        const SB_KEY = "sb_publishable_gBLWhsmXKbPqwjSMPIL96A_BQjLDiZe"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let itinerario = [];
        let globales = [];
        let otros = [];

        async function fetchData() {
            const { data: itData } = await _supabase.from('itinerario').select('*').order('id', { ascending: true });
            const { data: glData } = await _supabase.from('globales').select('*').order('id', { ascending: true });
            const { data: otData } = await _supabase.from('detalles_otros').select('*');
            
            itinerario = itData || [];
            globales = glData || [];
            otros = otData || [];
            renderAll();
        }

        function renderAll() {
            renderItinerario();
            renderGlobales();
            updateStats();
            lucide.createIcons();
        }

        function renderItinerario() {
            const container = document.getElementById('itinerario-list');
            container.innerHTML = itinerario.map(dia => {
                const otrosDia = otros.filter(o => o.itinerario_id === dia.id);
                return `
                <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 p-6">
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <p class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">${dia.fecha}</p>
                            <input type="text" onchange="updateDB('itinerario', ${dia.id}, 'ciudad', this.value)" 
                                   value="${dia.ciudad || ''}" placeholder="Destino..."
                                   class="text-lg font-bold text-slate-800 bg-transparent outline-none w-full">
                        </div>
                        <input type="text" onchange="updateDB('itinerario', ${dia.id}, 'pais', this.value)" 
                               value="${dia.pais || ''}" placeholder="PAÍS" 
                               class="text-right text-[10px] font-black text-slate-400 uppercase w-20 outline-none">
                    </div>

                    <div class="grid grid-cols-3 gap-2 mb-4">
                        <div class="bg-slate-50 p-3 rounded-2xl">
                            <label class="text-[8px] font-black uppercase text-slate-400 block mb-1">🚌 Traslado</label>
                            <input type="number" onchange="updateDB('itinerario', ${dia.id}, 'traslado_monto', this.value)" 
                                   value="${dia.traslado_monto}" class="w-full bg-transparent font-bold text-xs outline-none">
                            <input type="checkbox" ${dia.traslado_pago ? 'checked' : ''} onchange="updateDB('itinerario', ${dia.id}, 'traslado_pago', this.checked)" class="mt-1 accent-green-500">
                        </div>
                        <div class="bg-slate-50 p-3 rounded-2xl">
                            <label class="text-[8px] font-black uppercase text-slate-400 block mb-1">🏨 Alojamiento</label>
                            <input type="number" onchange="updateDB('itinerario', ${dia.id}, 'aloj_monto', this.value)" 
                                   value="${dia.aloj_monto}" class="w-full bg-transparent font-bold text-xs outline-none">
                            <input type="checkbox" ${dia.aloj_pago ? 'checked' : ''} onchange="updateDB('itinerario', ${dia.id}, 'aloj_pago', this.checked)" class="mt-1 accent-green-500">
                        </div>
                        <div class="bg-slate-50 p-3 rounded-2xl">
                            <label class="text-[8px] font-black uppercase text-slate-400 block mb-1">🍕 Comida</label>
                            <input type="number" onchange="updateDB('itinerario', ${dia.id}, 'comida_monto', this.value)" 
                                   value="${dia.comida_monto}" class="w-full bg-transparent font-bold text-xs outline-none">
                            <input type="checkbox" ${dia.comida_pago ? 'checked' : ''} onchange="updateDB('itinerario', ${dia.id}, 'comida_pago', this.checked)" class="mt-1 accent-green-500">
                        </div>
                    </div>

                    <div class="bg-slate-100/50 rounded-2xl p-3">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] font-black uppercase text-slate-500 italic">✨ Otros Detalles</span>
                            <button onclick="addOtrosRow(${dia.id})" class="text-blue-600"><i data-lucide="plus-circle" class="w-4 h-4"></i></button>
                        </div>
                        <div id="otros-container-${dia.id}" class="space-y-2">
                            ${otrosDia.map(o => `
                                <div class="flex items-center gap-2 bg-white p-2 rounded-xl shadow-sm">
                                    <input type="checkbox" ${o.pagado ? 'checked' : ''} onchange="updateDB('detalles_otros', ${o.id}, 'pagado', this.checked)" class="accent-blue-500">
                                    <input type="text" value="${o.categoria || ''}" onchange="updateDB('detalles_otros', ${o.id}, 'categoria', this.value)" class="text-[10px] flex-1 outline-none font-medium text-slate-600" placeholder="Ej: Museo">
                                    <input type="number" value="${o.monto}" onchange="updateDB('detalles_otros', ${o.id}, 'monto', this.value)" class="w-12 text-right text-[10px] font-bold outline-none">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderGlobales() {
            const container = document.getElementById('globales-list');
            container.innerHTML = globales.map(g => `
                <div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <input type="checkbox" ${g.pagado ? 'checked' : ''} onchange="updateDB('globales', ${g.id}, 'pagado', this.checked)" class="w-5 h-5 accent-blue-600">
                    <input type="text" value="${g.descripcion || ''}" onchange="updateDB('globales', ${g.id}, 'descripcion', this.value)" class="flex-1 bg-transparent text-sm font-bold outline-none" placeholder="Descripción...">
                    <input type="number" value="${g.monto}" onchange="updateDB('globales', ${g.id}, 'monto', this.value)" class="w-20 bg-transparent text-right font-black text-blue-600 outline-none">
                </div>
            `).join('');
        }

        async function addGlobalRow() {
            const { data, error } = await _supabase.from('globales').insert([{ descripcion: '', monto: 0, pagado: false }]).select();
            if(!error) fetchData();
        }

        async function addOtrosRow(itId) {
            const { error } = await _supabase.from('detalles_otros').insert([{ itinerario_id: itId, categoria: '', monto: 0, pagado: false }]);
            if(!error) fetchData();
        }

        async function updateDB(tabla, id, columna, valor) {
            await _supabase.from(tabla).update({ [columna]: valor }).eq('id', id);
            updateStatsLocally(tabla, id, columna, valor);
        }

        function updateStatsLocally(tabla, id, columna, valor) {
            let item;
            if(tabla === 'itinerario') item = itinerario.find(x => x.id === id);
            if(tabla === 'globales') item = globales.find(x => x.id === id);
            if(tabla === 'detalles_otros') item = otros.find(x => x.id === id);
            
            if (item) {
                item[columna] = (columna.includes('monto') || columna === 'monto') ? Number(valor) : valor;
                updateStats();
            }
        }

        function updateStats() {
            let total = 0; let pagado = 0;
            itinerario.forEach(d => {
                total += (Number(d.traslado_monto) || 0) + (Number(d.aloj_monto) || 0) + (Number(d.comida_monto) || 0);
                if(d.traslado_pago) pagado += (Number(d.traslado_monto) || 0);
                if(d.aloj_pago) pagado += (Number(d.aloj_monto) || 0);
                if(d.comida_pago) pagado += (Number(d.comida_monto) || 0);
            });
            globales.forEach(g => {
                total += (Number(g.monto) || 0);
                if(g.pagado) pagado += (Number(g.monto) || 0);
            });
            otros.forEach(o => {
                total += (Number(o.monto) || 0);
                if(o.pagado) pagado += (Number(o.monto) || 0);
            });
            document.getElementById('stat-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('stat-pagado').innerText = `$${pagado.toLocaleString()}`;
            document.getElementById('stat-pendiente').innerText = `$${(total - pagado).toLocaleString()}`;
        }

        function showTab(name, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${name}`).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('text-blue-400', 'bg-white/10'));
            btn.classList.add('text-blue-400', 'bg-white/10');
        }

        fetchData();
        const inicio = new Date('2026-05-04');
        const dias = Math.ceil((inicio - new Date()) / (1000 * 60 * 60 * 24));
        document.getElementById('countdown').innerText = dias > 0 ? `FALTAN ${dias} DÍAS` : "DISFRUTANDO";
    </script>
</body>
</html>
